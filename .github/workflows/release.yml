name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  APP_NAME: Diduny
  DISPLAY_NAME: Diduny
  SCHEME: Diduny
  PROJECT_FILE: Diduny.xcodeproj
  APP_BUNDLE_NAME: Diduny.app
  ARCHIVE_PATH: build/Diduny.xcarchive
  EXPORT_DIR: build/export
  KEYCHAIN_NAME: build.keychain-db
  USES_XCODEGEN: "true"

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: |
          sudo xcode-select -switch /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Validate required secrets
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          SPARKLE_EDDSA_PRIVATE_KEY: ${{ secrets.SPARKLE_EDDSA_PRIVATE_KEY }}
        run: |
          for var in APPLE_ID APPLE_APP_PASSWORD APPLE_TEAM_ID MACOS_CERTIFICATE_P12 MACOS_CERTIFICATE_PASSWORD SPARKLE_EDDSA_PRIVATE_KEY; do
            if [ -z "${!var}" ]; then
              echo "::error::Missing required secret: ${var}"
              exit 1
            fi
          done

      - name: Import Developer ID certificate
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$MACOS_CERTIFICATE_P12" | base64 --decode > certificate.p12

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_NAME"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security default-keychain -s "$KEYCHAIN_NAME"
          security list-keychains -d user -s "$KEYCHAIN_NAME" login.keychain-db

          security import certificate.p12 \
            -k "$KEYCHAIN_NAME" \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/productbuild

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_NAME"

          security find-identity -v -p codesigning "$KEYCHAIN_NAME"

      - name: Store notarization credentials
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          KEYCHAIN_PATH="$(security list-keychains -d user | head -1 | tr -d '[:space:]"')"
          xcrun notarytool store-credentials "$APP_NAME" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --keychain "$KEYCHAIN_PATH"

      - name: Generate Xcode project (XcodeGen)
        if: env.USES_XCODEGEN == 'true'
        run: |
          brew install xcodegen
          xcodegen generate --quiet

      - name: Resolve packages
        run: xcodebuild -resolvePackageDependencies -project "$PROJECT_FILE" -scheme "$SCHEME"

      - name: Archive universal app
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          BUILD_NUMBER=$(git rev-list --count HEAD)
          xcodebuild archive \
            -project "$PROJECT_FILE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath "$ARCHIVE_PATH" \
            -destination "generic/platform=macOS" \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER"

      - name: Export and verify app
        run: |
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_DIR" \
            -exportOptionsPlist ExportOptions.plist

          echo "Architectures:"
          lipo -archs "$EXPORT_DIR/$APP_BUNDLE_NAME/Contents/MacOS/$APP_NAME"

          codesign --verify --deep --strict --verbose=2 "$EXPORT_DIR/$APP_BUNDLE_NAME"

      - name: Notarize and staple
        run: |
          ditto -c -k --keepParent "$EXPORT_DIR/$APP_BUNDLE_NAME" "build/${APP_NAME}-notary.zip"

          KEYCHAIN_PATH="$(security list-keychains -d user | head -1 | tr -d '[:space:]"')"
          xcrun notarytool submit "build/${APP_NAME}-notary.zip" \
            --keychain-profile "$APP_NAME" \
            --keychain "$KEYCHAIN_PATH" \
            --wait

          xcrun stapler staple "$EXPORT_DIR/$APP_BUNDLE_NAME"
          spctl --assess --type exec --verbose "$EXPORT_DIR/$APP_BUNDLE_NAME"

      - name: Create DMG
        run: |
          brew install create-dmg
          VERSION=${GITHUB_REF_NAME#v}

          create-dmg \
            --volname "$DISPLAY_NAME" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "$APP_BUNDLE_NAME" 175 190 \
            --app-drop-link 425 190 \
            "build/${DISPLAY_NAME}-${VERSION}.dmg" \
            "$EXPORT_DIR/"

          shasum -a 256 "build/${DISPLAY_NAME}-${VERSION}.dmg" | awk '{print $1}' > "build/${DISPLAY_NAME}-${VERSION}.sha256"

      - name: Sign DMG with Sparkle EdDSA
        env:
          SPARKLE_EDDSA_PRIVATE_KEY: ${{ secrets.SPARKLE_EDDSA_PRIVATE_KEY }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          DMG_PATH="build/${DISPLAY_NAME}-${VERSION}.dmg"

          # Download Sparkle tools
          SPARKLE_VERSION="2.6.4"
          curl -sL "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" -o sparkle.tar.xz
          mkdir -p sparkle_tools
          tar -xf sparkle.tar.xz -C sparkle_tools

          # Sign the DMG and capture signature info
          SIGN_OUTPUT=$(echo "$SPARKLE_EDDSA_PRIVATE_KEY" | sparkle_tools/bin/sign_update "$DMG_PATH" -f -)
          echo "Sparkle signature: $SIGN_OUTPUT"
          # Use heredoc for safe GITHUB_ENV (output contains quotes and special chars)
          {
            echo 'SPARKLE_SIGN_OUTPUT<<SPARKLE_EOF'
            echo "$SIGN_OUTPUT"
            echo 'SPARKLE_EOF'
          } >> "$GITHUB_ENV"

      - name: Update appcast.xml
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          BUILD_NUMBER=$(git rev-list --count HEAD)
          DMG_PATH="build/${DISPLAY_NAME}-${VERSION}.dmg"
          DMG_SIZE=$(stat -f%z "$DMG_PATH")
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}/${DISPLAY_NAME}-${VERSION}.dmg"

          # Parse edSignature and length from sign_update output
          ED_SIGNATURE=$(echo "$SPARKLE_SIGN_OUTPUT" | sed -n 's/.*sparkle:edSignature="\([^"]*\)".*/\1/p')
          ED_LENGTH=$(echo "$SPARKLE_SIGN_OUTPUT" | sed -n 's/.*length="\([^"]*\)".*/\1/p')

          # Insert new item into appcast.xml using Python (sed can't handle multiline)
          python3 -c "
          import datetime, pathlib, sys
          appcast = pathlib.Path('docs/appcast.xml')
          content = appcast.read_text()
          marker = '<sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>'
          if marker in content:
              print('Version ${VERSION} already in appcast, skipping')
              sys.exit(0)
          pub_date = datetime.datetime.now(datetime.timezone.utc).strftime('%a, %d %b %Y %H:%M:%S %z')
          item = '''    <item>
              <title>Version ${VERSION}</title>
              <pubDate>{pub_date}</pubDate>
              <sparkle:version>${BUILD_NUMBER}</sparkle:version>
              <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
              <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>
              <enclosure
                url=\"${DOWNLOAD_URL}\"
                sparkle:edSignature=\"${ED_SIGNATURE}\"
                length=\"${ED_LENGTH:-$DMG_SIZE}\"
                type=\"application/octet-stream\" />
            </item>'''.format(pub_date=pub_date)
          content = content.replace('</channel>', item + '\n  </channel>')
          appcast.write_text(content)
          "

          echo "Updated appcast.xml with version ${VERSION}"
          cat docs/appcast.xml

      - name: Update appcast.xml via PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          VERSION=${GITHUB_REF_NAME#v}
          BRANCH="auto/appcast-${VERSION}"

          cp docs/appcast.xml /tmp/appcast.xml
          git checkout main
          git checkout -b "$BRANCH"
          cp /tmp/appcast.xml docs/appcast.xml
          git add docs/appcast.xml

          if ! git diff --quiet --cached -- docs/appcast.xml; then
            git commit -m "Update appcast.xml for ${GITHUB_REF_NAME}"
            git push origin "$BRANCH"
            gh pr create \
              --title "Update appcast.xml for ${GITHUB_REF_NAME}" \
              --body "Auto-generated by release workflow. Updates Sparkle appcast for v${VERSION}." \
              --base main \
              --head "$BRANCH"
            gh pr merge "$BRANCH" --squash --auto
          fi

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}

          gh release create "${GITHUB_REF_NAME}" \
            "build/${DISPLAY_NAME}-${VERSION}.dmg" \
            "build/${DISPLAY_NAME}-${VERSION}.sha256" \
            --title "${APP_NAME} ${VERSION}" \
            --generate-notes

      - name: Cleanup signing artifacts
        if: always()
        run: |
          security delete-keychain "$KEYCHAIN_NAME" || true
          rm -f certificate.p12 "build/${APP_NAME}-notary.zip"
